<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>snip — URL shortener</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #222230;
    --border-hover: #3a3a50;
    --text: #e8e8f0;
    --text-muted: #5a5a72;
    --text-dim: #8888a8;
    --accent: #7c6af7;
    --accent-glow: rgba(124, 106, 247, 0.15);
    --accent-dim: rgba(124, 106, 247, 0.4);
    --error: #f76a6a;
    --error-bg: rgba(247, 106, 106, 0.08);
    --success: #6af7b8;
    --success-bg: rgba(106, 247, 184, 0.08);
    --radius: 10px;
    --radius-sm: 6px;
    --mono: 'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(124,106,247,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 20px var(--accent-dim);
  }

  .logo-text {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .tagline {
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 16px;
    animation: fadeUp 0.5s ease both;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: var(--border-hover); }
  .card:nth-child(2) { animation-delay: 0.05s; }
  .card:nth-child(3) { animation-delay: 0.1s; }

  .card-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  /* Form fields */
  .field { margin-bottom: 16px; }
  .field:last-of-type { margin-bottom: 0; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }

  .optional-badge {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 6px;
    letter-spacing: 0;
  }

  input[type="text"],
  input[type="url"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 13.5px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  input::placeholder { color: var(--text-muted); }

  input:focus {
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  input.error-field {
    border-color: rgba(247,106,106,0.5);
    box-shadow: 0 0 0 3px rgba(247,106,106,0.06);
  }

  .field-error {
    font-size: 11.5px;
    color: var(--error);
    margin-top: 5px;
    display: none;
    animation: fadeIn 0.2s ease;
  }

  .field-error.visible { display: block; }

  /* Submit button */
  .btn {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 2px 16px var(--accent-dim);
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(255,255,255,0.08), transparent);
    pointer-events: none;
  }

  .btn:hover { opacity: 0.9; box-shadow: 0 4px 24px var(--accent-dim); }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    box-shadow: none;
  }

  .btn-secondary::after { display: none; }
  .btn-secondary:hover { border-color: var(--border-hover); opacity: 1; }

  /* Result box */
  .result-box {
    display: none;
    margin-top: 20px;
    padding: 16px;
    background: var(--success-bg);
    border: 1px solid rgba(106,247,184,0.15);
    border-radius: var(--radius-sm);
    animation: fadeUp 0.3s ease;
  }

  .result-box.visible { display: block; }

  .result-label {
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(106,247,184,0.6);
    margin-bottom: 8px;
  }

  .result-url-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-link {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--success);
    text-decoration: none;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .result-link:hover { text-decoration: underline; }

  .copy-btn {
    flex-shrink: 0;
    background: rgba(106,247,184,0.1);
    border: 1px solid rgba(106,247,184,0.2);
    border-radius: var(--radius-sm);
    color: var(--success);
    padding: 5px 10px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .copy-btn:hover { background: rgba(106,247,184,0.18); }
  .copy-btn:active { transform: scale(0.97); }
  .copy-btn.copied { color: var(--text-muted); border-color: var(--border); background: transparent; }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0 20px;
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 0.05em;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Lookup section */
  .lookup-row {
    display: flex;
    gap: 8px;
  }

  .lookup-row input { flex: 1; }

  .lookup-btn {
    width: auto;
    padding: 10px 16px;
    font-size: 13px;
    margin-top: 0;
    flex-shrink: 0;
  }

  /* Info card */
  .info-card {
    display: none;
    margin-top: 16px;
    padding: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    animation: fadeUp 0.3s ease;
  }

  .info-card.visible { display: block; }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .info-row:last-child { border-bottom: none; padding-bottom: 0; }
  .info-row:first-child { padding-top: 0; }

  .info-key {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .info-val {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
    word-break: break-all;
  }

  .info-val a { color: var(--accent); text-decoration: none; }
  .info-val a:hover { text-decoration: underline; }

  .click-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--accent-glow);
    border: 1px solid var(--accent-dim);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--accent);
  }

  /* Error box */
  .error-box {
    display: none;
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--error-bg);
    border: 1px solid rgba(247,106,106,0.15);
    border-radius: var(--radius-sm);
    font-size: 12.5px;
    color: var(--error);
    animation: fadeIn 0.2s ease;
  }

  .error-box.visible { display: block; }

  /* Date picker styles */
  .date-field { position: relative; }

  .date-input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .date-display {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 40px 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    user-select: none;
  }

  .date-display:focus, .date-display.open {
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .date-display.placeholder { color: var(--text-muted); font-family: 'Sora', sans-serif; font-size: 13.5px; }

  .date-icon {
    position: absolute;
    right: 12px;
    pointer-events: none;
    color: var(--text-muted);
    font-size: 14px;
  }

  .clear-date {
    position: absolute;
    right: 12px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px;
    display: none;
    transition: color 0.2s;
    line-height: 1;
  }

  .clear-date.visible { display: flex; align-items: center; }
  .clear-date:hover { color: var(--error); }

  /* Calendar popup */
  .calendar-popup {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    z-index: 100;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    animation: fadeUp 0.15s ease;
  }

  .calendar-popup.open { display: block; }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .cal-nav {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: border-color 0.2s, color 0.2s;
  }

  .cal-nav:hover { border-color: var(--border-hover); color: var(--text); }

  .cal-month-year {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-day-name {
    text-align: center;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    padding: 4px 0 8px;
  }

  .cal-day {
    text-align: center;
    font-size: 12px;
    font-family: var(--mono);
    padding: 6px 2px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text-dim);
    transition: background 0.15s, color 0.15s;
    border: none;
    background: none;
    width: 100%;
    line-height: 1.4;
  }

  .cal-day:hover:not(.disabled):not(.other-month) {
    background: var(--surface2);
    color: var(--text);
  }

  .cal-day.selected {
    background: var(--accent);
    color: #fff;
    font-weight: 500;
  }

  .cal-day.today {
    color: var(--accent);
    font-weight: 500;
  }

  .cal-day.today.selected { color: #fff; }

  .cal-day.disabled {
    color: var(--border-hover);
    cursor: not-allowed;
  }

  .cal-day.other-month { color: var(--border-hover); cursor: default; }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Footer */
  .footer {
    margin-top: 40px;
    text-align: center;
    font-size: 11.5px;
    color: var(--text-muted);
    animation: fadeIn 1s ease 0.4s both;
  }

  /* Mobile */
  @media (max-width: 480px) {
    body { padding: 32px 14px 60px; }
    .card { padding: 20px 18px; }
    .lookup-row { flex-direction: column; }
    .lookup-btn { width: 100%; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-mark">✂</div>
      <span class="logo-text">snip</span>
    </div>
    <p class="tagline">shorten, share, track</p>
  </div>

  <!-- Create section -->
  <div class="card">
    <div class="card-title">New short link</div>

    <div class="field">
      <label for="long-url">Destination URL</label>
      <input type="url" id="long-url" placeholder="https://example.com/your/long/url" autocomplete="off" spellcheck="false">
      <div class="field-error" id="url-error"></div>
    </div>

    <div class="field date-field">
      <label for="expiry-display">Expiry date <span class="optional-badge">optional</span></label>
      <div class="date-input-wrapper">
        <div class="date-display placeholder" id="expiry-display" tabindex="0" role="button" aria-label="Select expiry date">No expiry</div>
        <span class="date-icon" id="date-icon">📅</span>
        <button class="clear-date" id="clear-date" title="Clear date">✕</button>
        <div class="calendar-popup" id="calendar-popup"></div>
      </div>
      <input type="hidden" id="expiry-value">
    </div>

    <div class="field">
      <label for="alias">Custom alias <span class="optional-badge">optional</span></label>
      <input type="text" id="alias" placeholder="my-link (4–20 chars)" maxlength="20" autocomplete="off" spellcheck="false">
      <div class="field-error" id="alias-error"></div>
    </div>

    <div class="field-error error-box" id="create-api-error"></div>

    <button class="btn" id="shorten-btn" onclick="handleShorten()">Shorten URL</button>

    <div class="result-box" id="result-box">
      <div class="result-label">Shortened link</div>
      <div class="result-url-row">
        <a class="result-link" id="result-link" href="#" target="_blank"></a>
        <button class="copy-btn" id="copy-btn" onclick="copyResult()">Copy</button>
      </div>
    </div>
  </div>

  <!-- Lookup section -->
  <div class="divider">or look up</div>

  <div class="card">
    <div class="card-title">Link inspector</div>

    <div class="lookup-row">
      <input type="text" id="lookup-code" placeholder="Short code (e.g. abc123)" maxlength="20" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter') handleLookup()">
      <button class="btn btn-secondary lookup-btn" onclick="handleLookup()">Look up</button>
    </div>

    <div class="error-box" id="lookup-error"></div>

    <div class="info-card" id="info-card"></div>
  </div>

  <div class="footer">running on localhost:8000</div>
</div>

<script>
// ── Calendar ────────────────────────────────────────────────────────────────

const display   = document.getElementById('expiry-display');
const popup     = document.getElementById('calendar-popup');
const hidden    = document.getElementById('expiry-value');
const clearBtn  = document.getElementById('clear-date');
const dateIcon  = document.getElementById('date-icon');

let calDate = new Date();
let selectedDate = null;

const DAY_NAMES = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderCalendar() {
  const year  = calDate.getFullYear();
  const month = calDate.getMonth();
  const today = new Date(); today.setHours(0,0,0,0);

  const first = new Date(year, month, 1);
  const last  = new Date(year, month + 1, 0);
  const startDay = first.getDay();

  let html = `
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">‹</button>
      <span class="cal-month-year">${MONTHS[month]} ${year}</span>
      <button class="cal-nav" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">
      ${DAY_NAMES.map(d => `<div class="cal-day-name">${d}</div>`).join('')}
  `;

  // Prev month padding
  const prevLast = new Date(year, month, 0).getDate();
  for (let i = startDay - 1; i >= 0; i--) {
    html += `<button class="cal-day other-month" disabled>${prevLast - i}</button>`;
  }

  // Current month
  for (let d = 1; d <= last.getDate(); d++) {
    const date = new Date(year, month, d);
    const isPast = date < today;
    const isSel  = selectedDate && date.toDateString() === selectedDate.toDateString();
    const isTod  = date.toDateString() === today.toDateString();
    const cls    = [
      'cal-day',
      isPast  ? 'disabled'    : '',
      isSel   ? 'selected'   : '',
      isTod   ? 'today'      : ''
    ].filter(Boolean).join(' ');

    html += `<button class="${cls}" ${isPast ? 'disabled' : `onclick="selectDay(${year},${month},${d})"`}>${d}</button>`;
  }

  // Next month padding
  const totalCells = Math.ceil((startDay + last.getDate()) / 7) * 7;
  for (let d = 1; d <= totalCells - startDay - last.getDate(); d++) {
    html += `<button class="cal-day other-month" disabled>${d}</button>`;
  }

  html += '</div>';
  popup.innerHTML = html;
}

function calNav(dir) {
  calDate = new Date(calDate.getFullYear(), calDate.getMonth() + dir, 1);
  renderCalendar();
}

function selectDay(y, m, d) {
  selectedDate = new Date(y, m, d);
  const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  hidden.value = iso;
  display.textContent = selectedDate.toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'});
  display.classList.remove('placeholder');
  clearBtn.classList.add('visible');
  dateIcon.style.display = 'none';
  closeCalendar();
}

function clearDate() {
  selectedDate = null;
  hidden.value = '';
  display.textContent = 'No expiry';
  display.classList.add('placeholder');
  clearBtn.classList.remove('visible');
  dateIcon.style.display = '';
}

function openCalendar() {
  calDate = selectedDate ? new Date(selectedDate) : new Date();
  renderCalendar();
  popup.classList.add('open');
  display.classList.add('open');
}

function closeCalendar() {
  popup.classList.remove('open');
  display.classList.remove('open');
}

display.addEventListener('click', () => popup.classList.contains('open') ? closeCalendar() : openCalendar());
display.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); popup.classList.contains('open') ? closeCalendar() : openCalendar(); }});
clearBtn.addEventListener('click', e => { e.stopPropagation(); clearDate(); });
document.addEventListener('click', e => { if (!e.target.closest('.date-field')) closeCalendar(); });


// ── Helpers ──────────────────────────────────────────────────────────────────

const API = 'http://127.0.0.1:8000/api/v1';

function setError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.toggle('visible', !!msg);
  el.classList.toggle('error-box', id.endsWith('-api-error') || id.endsWith('-error') && !el.classList.contains('field-error'));
}

function setFieldError(id, inputId, msg) {
  const el = document.getElementById(id);
  const inp = document.getElementById(inputId);
  el.textContent = msg;
  el.classList.toggle('visible', !!msg);
  if (inp) inp.classList.toggle('error-field', !!msg);
}

function clearErrors() {
  ['url-error','alias-error','create-api-error'].forEach(id => setError(id, ''));
  ['long-url','alias'].forEach(id => { const el = document.getElementById(id); if (el) el.classList.remove('error-field'); });
}

function fmtDate(str) {
  if (!str) return null;
  const d = new Date(str);
  if (isNaN(d)) return str;
  return d.toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'});
}

function fmtDatetime(str) {
  if (!str) return null;
  const d = new Date(str);
  if (isNaN(d)) return str;
  return d.toLocaleDateString('en-US', {year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
}

function setLoading(btn, loading, text) {
  btn.disabled = loading;
  btn.innerHTML = loading ? `<span class="spinner"></span>${text}` : text;
}

// ── Shorten ───────────────────────────────────────────────────────────────────

async function handleShorten() {
  clearErrors();
  document.getElementById('result-box').classList.remove('visible');

  const urlVal   = document.getElementById('long-url').value.trim();
  const aliasVal = document.getElementById('alias').value.trim();
  const expiryVal = document.getElementById('expiry-value').value;

  let valid = true;

  if (!urlVal) {
    setFieldError('url-error','long-url','URL is required.'); valid = false;
  } else {
    try { new URL(urlVal); } catch {
      setFieldError('url-error','long-url','Please enter a valid URL including https://.'); valid = false;
    }
  }

  if (aliasVal && !/^[a-zA-Z0-9-]{4,20}$/.test(aliasVal)) {
    setFieldError('alias-error','alias','4–20 chars, letters, numbers, and hyphens only.'); valid = false;
  }

  if (!valid) return;

  const btn = document.getElementById('shorten-btn');
  setLoading(btn, true, 'Shortening…');

  try {
    const body = { original_url: urlVal };
    if (expiryVal) body.expires_at = expiryVal + 'T00:00:00';
    if (aliasVal)  body.custom_alias = aliasVal;

    const res  = await fetch(`${API}/urls`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if (!res.ok) {
      const msg = res.status === 409
        ? 'That alias is already taken. Try a different one.'
        : data.detail || data.message || `Error ${res.status}`;
      const el = document.getElementById('create-api-error');
      el.textContent = msg; el.classList.add('visible');
      return;
    }

    const shortUrl = `http://127.0.0.1:8000/${data.short_code}`;
    const link = document.getElementById('result-link');
    link.textContent = shortUrl;
    link.href = shortUrl;
    document.getElementById('result-box').classList.add('visible');
    document.getElementById('copy-btn').textContent = 'Copy';
    document.getElementById('copy-btn').classList.remove('copied');

  } catch (err) {
    const el = document.getElementById('create-api-error');
    el.textContent = 'Could not reach the server. Is it running?';
    el.classList.add('visible');
  } finally {
    setLoading(btn, false, 'Shorten URL');
  }
}

async function copyResult() {
  const url = document.getElementById('result-link').textContent;
  try {
    await navigator.clipboard.writeText(url);
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  } catch { /* silently fail */ }
}

// ── Lookup ────────────────────────────────────────────────────────────────────

async function handleLookup() {
  const errEl   = document.getElementById('lookup-error');
  const infoEl  = document.getElementById('info-card');
  errEl.classList.remove('visible');
  infoEl.classList.remove('visible');

  const code = document.getElementById('lookup-code').value.trim();
  if (!code) { errEl.textContent = 'Enter a short code to look up.'; errEl.classList.add('visible'); return; }

  const btn = document.querySelector('.lookup-btn');
  setLoading(btn, true, 'Looking up…');

  try {
    const res  = await fetch(`${API}/urls/${encodeURIComponent(code)}`);
    const data = await res.json();

    if (!res.ok) {
      const msg = res.status === 404 ? 'No link found for that code.'
                : res.status === 410 ? 'This link has expired.'
                : data.detail || data.message || `Error ${res.status}`;
      errEl.textContent = msg; errEl.classList.add('visible');
      return;
    }

    const rows = [
      { key: 'Original URL', val: data.original_url, isLink: true },
      { key: 'Short code',   val: data.short_code,   mono: true },
      { key: 'Created',      val: fmtDatetime(data.created_at) },
      data.expires_at ? { key: 'Expires',  val: fmtDate(data.expires_at) } : null,
      { key: 'Clicks',       val: data.click_count ?? 0, isBadge: true },
    ].filter(Boolean);

    infoEl.innerHTML = rows.map(r => {
      let valHtml;
      if (r.isBadge) {
        valHtml = `<span class="click-badge">↗ ${r.val.toLocaleString()} click${r.val !== 1 ? 's' : ''}</span>`;
      } else if (r.isLink) {
        const truncated = r.val.length > 45 ? r.val.slice(0, 42) + '…' : r.val;
        valHtml = `<a href="${r.val}" target="_blank" title="${r.val}">${truncated}</a>`;
      } else {
        valHtml = r.val || '—';
      }
      return `
        <div class="info-row">
          <span class="info-key">${r.key}</span>
          <span class="info-val">${valHtml}</span>
        </div>
      `;
    }).join('');

    infoEl.classList.add('visible');

  } catch {
    errEl.textContent = 'Could not reach the server. Is it running?';
    errEl.classList.add('visible');
  } finally {
    setLoading(btn, false, 'Look up');
  }
}

// Enter key on main URL field
document.getElementById('long-url').addEventListener('keydown', e => { if (e.key === 'Enter') handleShorten(); });
</script>
